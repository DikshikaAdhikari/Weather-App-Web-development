<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <!--Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

     <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">

     <!-- Header -->
    <div class="header">
      <h1>Weather App</h1>
        <button id="locationBtn">
            <i class="fa-solid fa-location-crosshairs"></i>
            Use My Location
        </button>
    </div>

     <!-- Search -->
    <div class="search-box">

        <input
        type="text"
        id="cityInput"
        placeholder="Enter city name">

        <button id="searchBtn">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>

    </div>
           <p id="errorMessage"></p>
      <!-- Loader -->
       <div id="loader" class="loader"></div>
    
           <!-- Weather Section -->
    <div class="weather">

        <img
        id="weatherIcon"
        src=""
        alt="Weather Icon">

        <h2 id="temp">--°C</h2>

        <h3 id="condition">
            Weather Condition
        </h3>

        <h2 id="city">
            City, Country
        </h2>
        <p id="dateTime">
            Date & Time
        </p>
    </div>

     <!-- Cards -->
    <div class="details">
        <div class="card">
            <i class="fa-solid fa-water"></i>
        <div>
           <p>Humidity</p>
              <h3 id="humidity">--%</h3>
        </div>
        </div>

        <div class="card">
            <i class="fa-solid fa-wind"></i>
              <div>
                <p>Wind Speed</p>
                   <h3 id="wind">-- km/h</h3>
            </div>
        </div>
            <div class="card">
                <i class="fa-solid fa-temperature-half"></i>
            <div>
                 <p>Feels Like</p>
                 <h3 id="feelsLike">--°C</h3>
            </div>
         </div>
      <div class="card">
                <i class="fa-solid fa-cloud"></i>
        <div>
             <p>Cloud</p>
             <h3 id="cloud">--%</h3>
        </div>
            </div>
            <div class="card">

    <i class="fa-solid fa-sun"></i>
    <div>
      <p>Sunrise</p>
      <h3 id="sunrise">--</h3>
    </div>
    </div>

   <div class="card">
   <i class="fa-solid fa-moon"></i>
   <div>

    <p>Sunset</p>
    <h3 id="sunset">--</h3>
    </div>
     </div>
        </div>
            </div>
            





<script src="app.js"></script>
</body>
</html>
